<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Isla de las Emociones</title>

<style>

body{
margin:0;
padding:0;
font-family:'Trebuchet MS', sans-serif;
background:linear-gradient(#87CEEB,#B5EAD7);
text-align:center;
min-height:100vh;
}

.contenedor{
padding:40px 20px;
}

h1{
font-size:70px;
color:#173F8A;
margin-bottom:40px;
font-weight:900;
}

.saludo{
font-size:38px;
font-weight:bold;
color:white;
margin-top:10px;
text-shadow:0 4px 8px rgba(0,0,0,0.15);
}

.texto{
font-size:28px;
font-weight:bold;
color:white;
margin-top:20px;
text-shadow:0 4px 8px rgba(0,0,0,0.15);
}

.emoticonos{
width:180px;
margin:35px auto 60px;
display:block;
}

.botones{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:22px;
}

.boton{
width:420px;
max-width:90%;
padding:24px;
border:none;
border-radius:25px;
font-size:24px;
font-weight:bold;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
cursor:pointer;
}

.sol{
background:#FFC107;
}

.nube{
background:#7EB8DA;
}

.volcan{
background:#D96F3C;
}

.luna{
background:#8573E8;
}

.verde{
background:#6CC36C;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🏝️ Isla de las Emociones</h1>

<div class="saludo">
👋 ¡Hola explorador!
</div>

<div class="texto">
Soy Emoti
</div>

<img
class="emoticonos"
src="file_00000000d820720e87d3c435524a1982.png"
alt="Emoti">

<div class="texto">
¿Qué emoción te acompaña hoy?
</div>

<div class="botones">

<button class="boton sol">
☀️ Me siento feliz
</button>

<button class="boton nube">
☁️ Me siento preocupado
</button>

<button class="boton volcan">
🌋 Me siento enojado
</button>

<button class="boton luna">
🌙 Me siento triste
</button>

<button class="boton verde">
🌿 Necesito calma
</button>

</div>

</div>

</body>
</html>
