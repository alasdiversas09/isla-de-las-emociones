<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Isla de las Emociones</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(#87CEEB,#B5EAD7);
text-align:center;
min-height:100vh;
}

.contenedor{
padding:30px;
}

h1{
color:#0F4C81;
font-size:48px;
}

p{
font-size:24px;
color:#333;
}

.emoti{
width:250px;
margin-top:20px;
}

.boton{
display:block;
width:280px;
margin:15px auto;
padding:18px;
font-size:22px;
border:none;
border-radius:20px;
cursor:pointer;
color:white;
font-weight:bold;
}

.sol{
background:#FDB813;
}

.nube{
background:#7EB8DA;
}

.volcan{
background:#D96C3F;
}

.luna{
background:#8A7CFF;
}

.verdi{
background:#68C26A;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🏝️ Isla de las Emociones</h1>

<img
class="emoti"
src="archivo_00000000d820720e87d3c435524a1982.png"
>

<p>
Hola explorador 👋
</p>

<p>
Soy Emoti.
</p>

<p>
¿Cómo te sientes hoy?
</p>

<button class="boton sol">
☀️ Me siento feliz
</button>

<button class="boton nube">
☁️ Me siento preocupado
</button>

<button class="boton volcan">
🌋 Me siento enojado
</button>

<button class="boton luna">
🌙 Me siento triste
</button>

<button class="boton verdi">
🌿 Necesito calma
</button>

</div>

</body>
</html>
