<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Isla de las Emociones</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Fredoka',sans-serif;
background:linear-gradient(to bottom,#8FD7EE,#B8F0D7);
text-align:center;
min-height:100vh;
}

.contenedor{
padding:30px 20px;
}

h1{
font-size:56px;
color:#184A8B;
margin-bottom:25px;
font-weight:600;
}

.emoti{
width:240px;
max-width:80%;
margin-bottom:25px;
filter:drop-shadow(0 8px 15px rgba(0,0,0,0.15));
}

.saludo{
color:white;
font-size:32px;
font-weight:500;
text-shadow:0 3px 6px rgba(0,0,0,0.15);
margin-bottom:15px;
}

.texto{
color:white;
font-size:26px;
font-weight:500;
text-shadow:0 3px 6px rgba(0,0,0,0.15);
margin:10px 0;
}

.botones{
margin-top:30px;
display:flex;
flex-direction:column;
gap:18px;
align-items:center;
}

.boton{
width:320px;
max-width:90%;
padding:20px;
border:none;
border-radius:25px;
font-family:'Fredoka',sans-serif;
font-size:22px;
font-weight:600;
color:white;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.15);
transition:0.3s;
}

.boton:hover{
transform:scale(1.03);
}

.sol{
background:#FDBB11;
}

.nube{
background:#7EB8DA;
}

.volcan{
background:#D96E3D;
}

.luna{
background:#8673F2;
}

.verdi{
background:#6CC36C;
}

</style>
</head>

<body>

<div class="contenedor">

<h1>🏝️ Isla de las Emociones</h1>

<img
class="emoti"
src="archivo_00000000d820720e87d3c435524a1982.png"
alt="Emoti">

<div class="saludo">
👋 ¡Hola explorador!
</div>

<div class="texto">
✨ Soy Emoti
</div>

<div class="texto">
🌈 ¿Qué emoción te acompaña hoy?
</div>

<div class="botones">

<button class="boton sol">
☀️ Me siento feliz
</button>

<button class="boton nube">
☁️ Me siento preocupado
</button>

<button class="boton volcan">
🌋 Me siento enojado
</button>

<button class="boton luna">
🌙 Me siento triste
</button>

<button class="boton verdi">
🌿 Necesito calma
</button>

</div>

</div>

</body>
</html>
